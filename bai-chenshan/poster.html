<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>《白衬衫》海报预览</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #0c1016;
      padding: 2rem 1rem;
    }
    .solo-wrap { width: min(420px, 92vw); }
    .solo-wrap .poster-sheet { max-height: none; width: 100%; }
    .solo-note {
      margin-top: 1.25rem;
      text-align: center;
      color: rgba(244, 246, 248, 0.55);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      line-height: 1.8;
    }
    .solo-note a { color: #c9d6e3; }
  </style>
</head>
<body>
  <div class="solo-wrap">
    <article class="poster-sheet" id="poster">
      <div class="poster-art">
        <img class="poster-base" src="assets/web/character/character_02.jpg" alt="《白衬衫》主视觉" />
        <img class="poster-overlay" src="assets/web/character/suwan_reunion.jpg" alt="" aria-hidden="true" />
        <div class="poster-grade"></div>
        <div class="poster-ink" aria-hidden="true"></div>
        <div class="poster-frame-line" aria-hidden="true"></div>
      </div>
      <div class="poster-type">
        <p class="poster-meta">杭州彰彰精彩文化传播有限公司　出品</p>
        <h1>白衬衫</h1>
        <p class="poster-tagline">
          <span>白衫易染，初心难守</span>
          <span>行稳不偏，方至终点</span>
        </p>
        <p class="poster-credit">导演 蝈蝈　｜　出品人 章燕君　｜　监制 林腾翔<br />极光心智工作室　AI承制</p>
      </div>
    </article>
    <p class="solo-note">
      剧本｜美术 孙浩堂　｜　制作 杨迪　孙浩堂<br />
      <a href="index.html">← 返回全案站</a>
    </p>
  </div>
</body>
</html>
