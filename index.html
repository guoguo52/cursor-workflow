<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>极光心智 · Cursor拆本进度看板</title>
<style>
:root{--bg:#f8fafc;--fg:#172033;--muted:#64748b;--line:#e2e8f0;--accent:#6366f1;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--blue:#0ea5e9;--purple:#a855f7;--pink:#ec4899;--card:#fff;--card2:#f1f5f9;--header:#1e293b;--header2:#334155;--radius:10px}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--fg:#e2e8f0;--muted:#94a3b8;--line:#334155;--card:#1e293b;--card2:#0f172a;--header:#0f172a;--header2:#1e293b}}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font:14px/1.6 system-ui,-apple-system,sans-serif;min-height:100vh}
.wrap{max-width:1400px;margin:0 auto;padding:20px}
h1{font-size:22px;font-weight:700;color:var(--accent);margin-bottom:4px}
.sub{color:var(--muted);margin-bottom:20px;font-size:13px}

/* Stats Cards */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;text-align:center}
.stat .num{font-size:28px;font-weight:700;line-height:1.2}
.stat .lbl{font-size:12px;color:var(--muted);margin-top:2px}
.c-green .num{color:var(--green)}.c-blue .num{color:var(--blue)}.c-amber .num{color:var(--amber)}.c-red .num{color:var(--red)}.c-accent .num{color:var(--accent)}.c-purple .num{color:var(--purple)}

/* Overall Progress */
.overall{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 20px;margin-bottom:24px}
.overall h3{font-size:14px;font-weight:600;margin-bottom:10px}
.pbar{height:10px;background:var(--card2);border-radius:5px;overflow:hidden;margin:6px 0}
.pbar .fill{height:100%;border-radius:5px;transition:width .4s}
.pbar-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}

/* Toolbar */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.toolbar select,.toolbar button{padding:8px 14px;border-radius:8px;border:1px solid var(--line);font-size:13px;cursor:pointer;background:var(--card);color:var(--fg)}
.toolbar button{background:var(--accent);color:#fff;border:none;font-weight:600}
.toolbar button:hover{opacity:.9}
.toolbar button.sec{background:var(--card2);color:var(--fg);border:1px solid var(--line)}

/* Filter tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--muted);font-weight:500;transition:.2s}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab:hover:not(.active){background:var(--card2)}

/* Episode Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;margin-bottom:24px}
.ep-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:.2s}
.ep-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.ep-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--header2);color:var(--fg)}
.ep-header h4{font-size:14px;font-weight:600}
.ep-header .ep-status{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
.st-pending{background:#e2e8f0;color:#475569}
.st-doing{background:#bfdbfe;color:#1d4ed8}
.st-done{background:#bbf7d0;color:#166534}
.st-issue{background:#fecaca;color:#991b1b}
.st-review{background:#fde68a;color:#92400e}

.ep-body{padding:10px 14px}
.phase{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;border-bottom:1px solid var(--line)}
.phase:last-child{border:none}
.phase-label{width:68px;flex-shrink:0;font-weight:500;color:var(--muted);font-size:11px}
.phase-person{width:50px;flex-shrink:0;text-align:center;font-size:11px;color:var(--blue);font-weight:600;cursor:pointer;padding:2px 4px;border-radius:4px}
.phase-person:hover{background:var(--card2)}
.phase-status{flex:1;display:flex;gap:3px}
.phase-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--line);cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent}
.phase-dot:hover{border-color:var(--accent)}
.phase-dot.d0{border-color:#94a3b8;background:transparent}
.phase-dot.d1{border-color:#3b82f6;background:#dbeafe;color:#3b82f6}
.phase-dot.d2{border-color:#f59e0b;background:#fef3c7;color:#f59e0b}
.phase-dot.d3{border-color:#10b981;background:#d1fae5;color:#10b981}
.phase-dot.d4{border-color:#ef4444;background:#fee2e2;color:#ef4444}
.phase-note{flex-shrink:0;font-size:16px;cursor:pointer;color:var(--muted);padding:0 4px}
.phase-note:hover{color:var(--accent)}
.phase-note.has{color:var(--amber)}

/* Review row */
.review{display:flex;gap:6px;padding:4px 0;flex-wrap:wrap}
.rev-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;cursor:pointer;transition:.2s}
.rev-wait{background:#e2e8f0;color:#64748b}
.rev-pass{background:#bbf7d0;color:#166534}
.rev-fail{background:#fecaca;color:#991b1b}
.rev-progress{background:#fde68a;color:#854d0e}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:16px;padding:24px;width:90%;max-width:420px;max-height:80vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:12px}
.modal label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;margin-top:10px}
.modal select,.modal input,.modal textarea{width:100%;padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--bg);color:var(--fg)}
.modal textarea{min-height:60px;resize:vertical}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.modal-btns button{padding:8px 18px;border-radius:8px;border:none;font-size:13px;cursor:pointer;font-weight:600}
.btn-ok{background:var(--accent);color:#fff}
.btn-no{background:var(--card2);color:var(--fg);border:1px solid var(--line)!important}

/* Legend */
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;padding:12px 16px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);font-size:12px}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:14px;height:14px;border-radius:50%;border:2px solid}
.legend-dot.l0{border-color:#94a3b8;background:transparent}
.legend-dot.l1{border-color:#3b82f6;background:#dbeafe}
.legend-dot.l2{border-color:#f59e0b;background:#fef3c7}
.legend-dot.l3{border-color:#10b981;background:#d1fae5}
.legend-dot.l4{border-color:#ef4444;background:#fee2e2}

/* Person view */
.person-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.person-card h4{font-size:15px;font-weight:700;margin-bottom:8px}
.person-stats{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
.person-stats span{padding:3px 10px;background:var(--card2);border-radius:12px}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--header);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:2000;transform:translateY(80px);opacity:0;transition:.3s}
.toast.show{transform:translateY(0);opacity:1}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}

/* Batch header */
.batch-header{font-size:15px;font-weight:700;color:var(--accent);margin:20px 0 10px;padding-left:8px;border-left:3px solid var(--accent)}
</style>
</head>
<body>
<div class="wrap">
<h1>🎬 极光心智 · Cursor拆本进度看板</h1>
<p class="sub">总集数 40 · 点击圆点更新状态 · 点击👤分配负责人 · 点击📝添加备注 · 数据自动保存至浏览器</p>

<!-- Stats -->
<div class="stats" id="stats"></div>

<!-- Overall Progress -->
<div class="overall" id="overall"></div>

<!-- Toolbar -->
<div class="toolbar">
  <select id="viewMode"><option value="batch">按批次查看</option><option value="person">按人员查看</option></select>
  <select id="phaseFilter"><option value="all">全部阶段</option><option value="script">剧本细化</option><option value="asset">资产生成</option><option value="storyboard">故事板审核</option><option value="video">分镜视频</option><option value="roughcut">粗剪辑</option><option value="finalcut">精剪字幕</option></select>
  <select id="batchFilter"><option value="all">全部批次</option><option value="1">第1批 (1-10集)</option><option value="2">第2批 (11-20集)</option><option value="3">第3批 (21-30集)</option><option value="4">第4批 (31-40集)</option></select>
  <button class="sec" onclick="exportJSON()">📤 导出JSON</button>
  <button class="sec" onclick="importJSON()">📥 导入JSON</button>
  <button class="sec" onclick="resetData()">🔄 重置数据</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot l0"></div>未开始</div>
  <div class="legend-item"><div class="legend-dot l1"></div>进行中</div>
  <div class="legend-item"><div class="legend-dot l2"></div>审核中</div>
  <div class="legend-item"><div class="legend-dot l3"></div>已完成</div>
  <div class="legend-item"><div class="legend-dot l4"></div>退回修改</div>
</div>

<!-- Content -->
<div id="content"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
<div class="modal">
  <h3 id="modalTitle">编辑</h3>
  <div id="modalBody"></div>
  <div class="modal-btns">
    <button class="btn-no" onclick="closeModal()">取消</button>
    <button class="btn-ok" id="modalOk" onclick="modalSave()">保存</button>
  </div>
</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============ DATA MODEL ============
const PHASES = [
  {key:'script', name:'剧本细化', persons:['夏木','蝈蝈','郭华','孙浩堂','小韦'], defaultPerson:'夏木'},
  {key:'asset', name:'资产生成', persons:['夏木','蝈蝈','郭华','孙浩堂','小韦'], defaultPerson:'夏木'},
  {key:'storyboard', name:'故事板审核', persons:['夏木','蝈蝈','郭华','孙浩堂','小韦','甲方'], defaultPerson:'蝈蝈'},
  {key:'video', name:'分镜视频', persons:['夏木','蝈蝈','郭华','孙浩堂','小韦'], defaultPerson:'夏木'},
  {key:'roughcut', name:'粗剪辑', persons:['夏木','蝈蝈','郭华','孙浩堂','小韦'], defaultPerson:'小韦'},
  {key:'finalcut', name:'精剪字幕', persons:['蝈蝈'], defaultPerson:'蝈蝈'}
];

const REVIEWS = [
  {key:'script_review_guoguo', label:'蝈蝈审剧本'},
  {key:'script_review_client', label:'甲方审剧本'},
  {key:'asset_review_guoguo', label:'蝈蝈审资产'},
  {key:'asset_review_client', label:'甲方审资产'},
  {key:'story_review_guoguo', label:'蝈蝈审故事板'},
  {key:'story_review_client', label:'甲方审故事板'},
  {key:'final_review_client', label:'甲方终审成片'}
];

const STATUS = {0:'未开始',1:'进行中',2:'审核中',3:'已完成',4:'退回修改'};
const STATUS_CLS = {0:'d0',1:'d1',2:'d2',3:'d3',4:'d4'};
const CARD_STATUS = {0:'st-pending',1:'st-doing',2:'st-review',3:'st-done',4:'st-issue'};
const REV_STATUS = {0:'st-review',1:'st-progress',2:'st-pass',3:'st-fail'};

const EPISODES = 40;
const BATCH_SIZE = 10;

// ============ STORAGE ============
let data;
function load(){
  const saved = localStorage.getItem('cursor_workflow_v2');
  if(saved){ data = JSON.parse(saved); } else { init(); }
}
function save(){ localStorage.setItem('cursor_workflow_v2', JSON.stringify(data)); toast('💾 已自动保存'); }
function init(){
  data = { episodes:[] };
  for(let i=1;i<=EPISODES;i++){
    const ep = {id:i, batch:Math.ceil(i/BATCH_SIZE), phases:{}, reviews:{}, notes:{}};
    PHASES.forEach(p=>{ ep.phases[p.key] = {status:0, person:p.defaultPerson}; ep.notes[p.key] = ''; });
    REVIEWS.forEach(r=>{ ep.reviews[r.key] = 0; });
    // Pre-fill: episodes 1-11 rough cut done by 小韦
    if(i<=11){
      ep.phases.script.status = 3;
      ep.phases.asset.status = 3;
      ep.phases.storyboard.status = 3;
      ep.phases.video.status = 3;
      ep.phases.roughcut.status = 3;
      ep.phases.roughcut.person = '小韦';
      ep.phases.finalcut.status = 1;
      ep.notes.roughcut = i<=2 ? '需增补两组镜头' : '';
      ep.reviews.script_review_guoguo = 2;
      ep.reviews.script_review_client = 2;
      ep.reviews.asset_review_guoguo = 2;
      ep.reviews.asset_review_client = 2;
      ep.reviews.story_review_guoguo = 2;
      ep.reviews.story_review_client = 2;
    }
    data.episodes.push(ep);
  }
  save();
}

// ============ RENDER ============
function render(){
  renderStats();
  renderOverall();
  const mode = document.getElementById('viewMode').value;
  if(mode==='person') renderPersonView(); else renderBatchView();
}

function renderStats(){
  const eps = data.episodes;
  const done = eps.filter(e=>getEpStatus(e)>=3).length;
  const doing = eps.filter(e=>{const s=getEpStatus(e);return s===1||s===2}).length;
  const issue = eps.filter(e=>getEpStatus(e)===4).length;
  const pending = eps.filter(e=>getEpStatus(e)===0).length;
  const phaseComplete = PHASES.reduce((a,p)=>a+eps.filter(e=>e.phases[p.key].status===3).length,0);
  const totalPhase = EPISODES * PHASES.length;
  const pct = Math.round(phaseComplete/totalPhase*100);
  document.getElementById('stats').innerHTML = `
    <div class="stat c-accent"><div class="num">${EPISODES}</div><div class="lbl">总集数</div></div>
    <div class="stat c-green"><div class="num">${done}</div><div class="lbl">已完成集数</div></div>
    <div class="stat c-blue"><div class="num">${doing}</div><div class="lbl">进行中</div></div>
    <div class="stat c-amber"><div class="num">${pending}</div><div class="lbl">未开始</div></div>
    <div class="stat c-red"><div class="num">${issue}</div><div class="lbl">退回修改</div></div>
    <div class="stat c-purple"><div class="num">${pct}%</div><div class="lbl">总进度</div></div>`;
}

function renderOverall(){
  const eps = data.episodes;
  let html = '<h3>📊 各阶段完成进度</h3>';
  PHASES.forEach(p=>{
    const d = eps.filter(e=>e.phases[p.key].status===3).length;
    const pct = Math.round(d/EPISODES*100);
    const color = pct===100?'var(--green)':pct>50?'var(--blue)':'var(--amber)';
    html+=`<div class="pbar-label"><span>${p.name}</span><span>${d}/${EPISODES} (${pct}%)</span></div><div class="pbar"><div class="fill" style="width:${pct}%;background:${color}"></div></div>`;
  });
  // Reviews
  html+='<h3 style="margin-top:16px">🔍 审核进度</h3>';
  REVIEWS.forEach(r=>{
    const d = eps.filter(e=>e.reviews[r.key]===2).length;
    const pct = Math.round(d/EPISODES*100);
    const color = pct===100?'var(--green)':'var(--purple)';
    html+=`<div class="pbar-label"><span>${r.label}</span><span>${d}/${EPISODES} (${pct}%)</span></div><div class="pbar"><div class="fill" style="width:${pct}%;background:${color}"></div></div>`;
  });
  document.getElementById('overall').innerHTML = html;
}

function getEpStatus(ep){
  const scores = PHASES.map(p=>ep.phases[p.key].status);
  if(scores.some(s=>s===4)) return 4;
  if(scores.every(s=>s===3)) return 3;
  if(scores.some(s=>s===2)) return 2;
  if(scores.some(s=>s===1)) return 1;
  return 0;
}

function getEpStatusText(ep){
  const s=getEpStatus(ep);
  if(s===3) return '已完成';
  if(s===4) return '有退回';
  const phases = PHASES;
  const lastDone = phases.findLast(p=>ep.phases[p.key].status===3);
  const nextPhase = lastDone ? phases[phases.indexOf(lastDone)+1] : phases[0];
  if(nextPhase) return nextPhase ? nextPhase.name : '—';
  return '—';
}

function renderBatchView(){
  const filter = document.getElementById('batchFilter').value;
  const phaseF = document.getElementById('phaseFilter').value;
  let html='';
  const batches = filter==='all'?[1,2,3,4]:[parseInt(filter)];
  batches.forEach(b=>{
    const eps = data.episodes.filter(e=>e.batch===b);
    html+=`<div class="batch-header">📦 第${b}批 (${(b-1)*BATCH_SIZE+1}-${b*BATCH_SIZE}集)</div>`;
    html+='<div class="grid">';
    eps.forEach(ep=>{
      if(phaseF!=='all'){
        const phasesToShow = PHASES.filter(p=>p.key===phaseF);
        html+=renderEpCard(ep, phasesToShow);
      } else {
        html+=renderEpCard(ep, PHASES);
      }
    });
    html+='</div>';
  });
  document.getElementById('content').innerHTML = html;
}

function renderEpCard(ep, phases){
  const st = getEpStatus(ep);
  const cls = CARD_STATUS[st];
  const stText = st===3?'✅ 已完成':st===4?'⚠️ 有退回':st===2?'⏳ 审核中':st===1?'🔨 进行中':'⬜ 未开始';
  let html=`<div class="ep-card"><div class="ep-header"><h4>第 ${ep.id} 集</h4><span class="ep-status ${cls}">${stText}</span></div><div class="ep-body">`;
  phases.forEach(p=>{
    const s = ep.phases[p.key].status;
    const person = ep.phases[p.key].person;
    const note = ep.notes[p.key];
    html+=`<div class="phase"><span class="phase-label">${p.name}</span><span class="phase-person" onclick="editPerson(${ep.id},'${p.key}')" title="点击更换负责人">👤${person}</span>`;
    html+=`<div class="phase-status">`;
    for(let i=0;i<=4;i++){
      html+=`<div class="phase-dot ${STATUS_CLS[i]}" onclick="setStatus(${ep.id},'${p.key}',${i})" title="${STATUS[i]}">${i===3?'✓':i===4?'✗':''}</div>`;
    }
    html+=`</div>`;
    html+=`<span class="phase-note ${note?'has':''}" onclick="editNote(${ep.id},'${p.key}')" title="备注">📝</span></div>`;
  });
  // Reviews
  const epReviews = REVIEWS.filter(r=>{
    if(r.key.includes('script')||r.key.includes('asset')||r.key.includes('story')) return true;
    if(r.key.includes('final')) return true;
    return true;
  });
  html+='<div class="review">';
  epReviews.forEach(r=>{
    const s = ep.reviews[r.key];
    const cls = s===0?'rev-wait':s===1?'rev-progress':s===2?'rev-pass':'rev-fail';
    const txt = s===0?'待审':s===1?'审核中':s===2?'已过':'退回';
    html+=`<span class="rev-badge ${cls}" onclick="cycleReview(${ep.id},'${r.key}')" title="点击切换">${r.label}:${txt}</span>`;
  });
  html+='</div>';
  html+='</div></div>';
  return html;
}

function renderPersonView(){
  const persons = ['夏木','蝈蝈','郭华','孙浩堂','小韦'];
  let html='';
  persons.forEach(p=>{
    const myEps = data.episodes.filter(ep=>PHASES.some(ph=>ep.phases[ph.key].person===p && ep.phases[ph.key].status!==0));
    const done = data.episodes.filter(ep=>PHASES.some(ph=>ep.phases[ph.key].person===p && ep.phases[ph.key].status===3)).length;
    const doing = myEps.length - done;
    const issue = data.episodes.filter(ep=>PHASES.some(ph=>ep.phases[ph.key].person===p && ep.phases[ph.key].status===4)).length;
    html+=`<div class="person-card"><h4>👤 ${p}</h4>`;
    html+=`<div class="person-stats"><span>负责 ${myEps.length} 集</span><span>已完成 ${done}</span><span>进行中 ${doing}</span><span>退回 ${issue}</span></div>`;
    html+='<div style="margin-top:10px">';
    myEps.forEach(ep=>{
      const myPhases = PHASES.filter(ph=>ep.phases[ph.key].person===p);
      myPhases.forEach(ph=>{
        const s=ep.phases[ph.key].status;
        const color=s===3?'var(--green)':s===4?'var(--red)':s>0?'var(--blue)':'var(--muted)';
        html+=`<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12px"><span style="color:var(--muted);width:50px">第${ep.id}集</span><span>${ph.name}</span><span style="width:10px;height:10px;border-radius:50%;background:${color}"></span><span style="color:var(--muted);font-size:11px">${STATUS[s]}</span></div>`;
      });
    });
    html+='</div></div>';
  });
  document.getElementById('content').innerHTML = html;
}

// ============ INTERACTIONS ============
function setStatus(epId, phaseKey, status){
  data.episodes[epId-1].phases[phaseKey].status = status;
  save(); render();
}

function editPerson(epId, phaseKey){
  const ep = data.episodes[epId-1];
  const phase = PHASES.find(p=>p.key===phaseKey);
  const current = ep.phases[phaseKey].person;
  let html=`<label>当前: ${current}</label><label>更换为:</label><select id="mPerson">`;
  phase.persons.forEach(p=>{ html+=`<option value="${p}" ${p===current?'selected':''}>${p}</option>`; });
  html+='</select>';
  showModal('👤 更换负责人 - 第'+epId+'集 '+phase.name, html, ()=>{
    ep.phases[phaseKey].person = document.getElementById('mPerson').value;
    save(); render();
  });
}

function editNote(epId, phaseKey){
  const ep = data.episodes[epId-1];
  const phase = PHASES.find(p=>p.key===phaseKey);
  let html=`<label>备注内容</label><textarea id="mNote">${ep.notes[phaseKey]||''}</textarea>`;
  showModal('📝 备注 - 第'+epId+'集 '+phase.name, html, ()=>{
    ep.notes[phaseKey] = document.getElementById('mNote').value;
    save(); render();
  });
}

function cycleReview(epId, reviewKey){
  const ep = data.episodes[epId-1];
  ep.reviews[reviewKey] = (ep.reviews[reviewKey]+1) % 4;
  save(); render();
}

// ============ MODAL ============
let modalCallback = null;
function showModal(title, body, cb){
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  modalCallback = cb;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); modalCallback=null; }
function modalSave(){ if(modalCallback) modalCallback(); closeModal(); }

// ============ TOAST ============
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ============ EXPORT / IMPORT ============
function exportJSON(){
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`cursor-workflow-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); toast('📤 已导出');
}
function importJSON(){ document.getElementById('importFile').click(); }
function handleImport(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    try{ data=JSON.parse(r.result); save(); render(); toast('📥 导入成功'); }
    catch(err){ toast('❌ JSON格式错误'); }
  };
  r.readAsText(f);
  e.target.value='';
}
function resetData(){
  if(confirm('确定重置所有数据？这将恢复到初始状态。')){ localStorage.removeItem('cursor_workflow_v2'); init(); render(); toast('🔄 已重置'); }
}

// ============ INIT ============
document.getElementById('viewMode').addEventListener('change', render);
document.getElementById('phaseFilter').addEventListener('change', render);
document.getElementById('batchFilter').addEventListener('change', render);
load();
render();
</script>
